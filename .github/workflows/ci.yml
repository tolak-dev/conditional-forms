name: Nx CI/CD Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  pr-checks:
    name: PR Checks (Lint & Test Affected)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Determine Affected Projects
        id: affected-projects
        run: |
          AFFECTED_PROJECTS=$(npx nx affected --base=origin/master --head=HEAD --plain --target=lint)
          echo "Affected projects: $AFFECTED_PROJECTS"
          echo "affected_projects=$AFFECTED_PROJECTS" >> $GITHUB_OUTPUT
        shell: bash

      - name: Run Affected Lint
        if: steps.affected-projects.outputs.affected_projects != ''
        run: npx nx affected --target=lint --base=origin/master --head=HEAD --parallel

      - name: Run Affected Tests
        if: steps.affected-projects.outputs.affected_projects != ''
        run: npx nx affected --target=test --base=origin/master --head=HEAD --parallel --ci --code-coverage

  release-and-publish:
    name: Release & Publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-checks]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Nx Release & Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx nx release --verbose --git-remote=origin --publish
