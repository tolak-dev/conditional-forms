name: CI & Release Pipeline

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version (patch, minor, major, or 1.2.3)'
        required: false

jobs:
  # ----------------------------
  # 1️⃣ CI Job - Always runs first
  # ----------------------------
  ci:
    name: Lint, Test, Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for affected
        uses: nrwl/nx-set-shas@v4
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          main-branch-name: master

      - name: Lint affected
        run: npx nx affected -t lint --parallel=3
      - name: Test affected
        run: npx nx affected -t test --parallel=3
      - name: Typecheck affected
        run: npx nx affected -t typecheck --parallel=3

  # ----------------------------
  # 2️⃣ Release + Publish Job - Only if CI passes
  # ----------------------------
  release:
    name: Version & Publish to npm
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write # Changed from 'read' to 'write' for pushing tags
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and generate changelogs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            npx nx release version ${{ github.event.inputs.version }} --git-commit --git-tag --git-push
          else
            npx nx release version --git-commit --git-tag --git-push
          fi

      - name: Publish to npm
        run: npx nx release publish --yes
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
