name: CI & Release

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version (patch, minor, major, or 1.2.3)'
        required: false

jobs:
  ci:
    name: Lint, Test, Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: npx nx affected -t lint --parallel=3
      - name: Test affected
        run: npx nx affected -t test --parallel=3
      - name: Typecheck affected
        run: npx nx affected -t typecheck --parallel=3

  release:
    name: Version & Publish to npm
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and generate changelogs for affected projects
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            npx nx release version ${{ github.event.inputs.version }} --git-commit --git-tag --git-push
            echo "Version set to ${{ github.event.inputs.version }}"
          else
            npx nx release version --git-commit --git-tag --git-push
            echo "No version input provided, using default versioning"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npx nx release publish --yes
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
