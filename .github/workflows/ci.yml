name: Nx CI/CD Pipeline

on:
  pull_request:
    branches:
      - master # Trigger on PRs targeting the master branch
  push:
    branches:
      - master # Trigger on pushes to the master branch (for releases)

jobs:
  # Job for running linting and testing on Pull Requests
  pr-checks:
    name: PR Checks (Lint & Test Affected)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Set a timeout for the job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for Nx affected commands to correctly determine changes
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps # Install dependencies, using legacy peer deps if necessary

      - name: Derive SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: npx nx affected -t lint --parallel=3
      - name: Test affected
        run: npx nx affected -t test --parallel=3

      - name: Typecheck affected
        run: npx nx affected -t typecheck --parallel=3

  # Job for releasing and publishing after merge to master
  release-and-publish:
    name: Release & Publish (Affected Projects)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Set a timeout for the job
    needs: [pr-checks] # Ensure PR checks pass before attempting to release (optional, but recommended)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # IMPORTANT: Fetch all history for nx release to correctly determine versions and generate changelogs
          fetch-depth: 0
          # Provide a token with write access to push back version bumps and tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
          # Configure npm for publishing
          registry-url: '[https://registry.npmjs.org](https://registry.npmjs.org)'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps # Install dependencies, using legacy peer deps if necessary

      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Nx Release
        env:
          # NPM_TOKEN is required for publishing to npm
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # GITHUB_TOKEN is used by nx release to push tags and commits
          # It's automatically provided by GitHub Actions, but explicitly passing it can be safer.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The `nx release` command handles:
          # 1. Determining affected projects for versioning (if configured for independent versions).
          # 2. Bumping versions in package.json files.
          # 3. Generating changelogs.
          # 4. Creating Git tags.
          # 5. Committing changes (version bumps, changelogs).
          # 6. Pushing commits and tags to the remote.
          # 7. Publishing to npm (if `--publish` is used and configured).

          # Use --verbose for more detailed output during the release process
          # --git-remote=origin specifies the remote to push to
          # --publish tells nx release to also publish the packages to the configured registry (npm)
          npx nx release --verbose --git-remote=origin --publish
