name: CI (PR + Merge Checks)

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  ci:
    name: Lint, Test, Typecheck Affected
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Print Nx info
        run: npx nx report

      # Optional: enable Nx Cloud distributed caching
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      - name: Lint affected
        run: npx nx affected --target=lint --parallel=3 --base=origin/master

      - name: Test affected
        run: npx nx affected --target=test --parallel=3 --base=origin/master

      - name: Typecheck affected
        run: npx nx affected --target=typecheck --parallel=3 --base=origin/master
