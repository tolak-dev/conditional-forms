name: CI & Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version (patch, minor, major, or 1.2.3)'
        required: false

jobs:
  ci:
    name: Lint, Test, Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: npx nx affected -t lint --parallel=3
      - name: Test affected
        run: npx nx affected -t test --parallel=3
      - name: Typecheck affected
        run: npx nx affected -t typecheck --parallel=3

  release:
    name: Version projects
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run Nx Release Version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            npx nx release version ${{ github.event.inputs.version }} --git-commit --git-tag --git-push
          else
            npx nx release version --git-commit --git-tag --git-push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
