name: Nx CI/CD Pipeline

on:
  pull_request:
    branches:
      - master # Trigger on PRs targeting the master branch
  push:
    branches:
      - master # Trigger on pushes to the master branch (for releases)

jobs:
  # Job for running linting and testing on Pull Requests
  pr-checks:
    name: PR Checks (Lint & Test Affected)
    if: github.event_name == 'pull_request' # Only run this job for pull_request events
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Set a timeout for the job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for Nx affected commands to correctly determine changes
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version

      - name: Install Dependencies
        run: npm ci # Use npm ci for clean installs in CI environments

      - name: Cache Nx
        uses: nx/actions/cache@v4
        with:
          # Specify the path where Nx caches its computation results
          path: .nx/cache

      - name: Determine Affected Projects
        id: affected-projects # Store the list of affected projects in an output variable
        run: |
          # Use nx affected to find projects that changed relative to the master branch
          # and store them as a space-separated string.
          # This is useful if you want to iterate over affected projects later.
          AFFECTED_PROJECTS=$(npx nx affected --base=origin/master --head=HEAD --plain --target=lint)
          echo "Affected projects: $AFFECTED_PROJECTS"
          echo "affected_projects=$AFFECTED_PROJECTS" >> $GITHUB_OUTPUT

      - name: Run Affected Lint
        # Only run if there are affected projects
        if: steps.affected-projects.outputs.affected_projects != ''
        run: npx nx affected --target=lint --base=origin/master --head=HEAD --parallel # Run linting for affected projects in parallel

      - name: Run Affected Tests
        # Only run if there are affected projects
        if: steps.affected-projects.outputs.affected_projects != ''
        run: npx nx affected --target=test --base=origin/master --head=HEAD --parallel --ci --code-coverage # Run tests for affected projects, enable CI mode and code coverage

  # Job for releasing and publishing after merge to master
  release-and-publish:
    name: Release & Publish (Affected Projects)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' # Only run this job for pushes to master
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Set a timeout for the job
    needs: [pr-checks] # Ensure PR checks pass before attempting to release (optional, but recommended)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # IMPORTANT: Fetch all history for nx release to correctly determine versions and generate changelogs
          fetch-depth: 0
          # Provide a token with write access to push back version bumps and tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
          # Configure npm for publishing
          registry-url: '[https://registry.npmjs.org](https://registry.npmjs.org)'

      - name: Install Dependencies
        run: npm ci

      - name: Cache Nx
        uses: nx/actions/cache@v4
        with:
          path: .nx/cache

      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Nx Release
        env:
          # NPM_TOKEN is required for publishing to npm
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # GITHUB_TOKEN is used by nx release to push tags and commits
          # It's automatically provided by GitHub Actions, but explicitly passing it can be safer.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The `nx release` command handles:
          # 1. Determining affected projects for versioning (if configured for independent versions).
          # 2. Bumping versions in package.json files.
          # 3. Generating changelogs.
          # 4. Creating Git tags.
          # 5. Committing changes (version bumps, changelogs).
          # 6. Pushing commits and tags to the remote.
          # 7. Publishing to npm (if `--publish` is used and configured).

          # Use --verbose for more detailed output during the release process
          # --git-remote=origin specifies the remote to push to
          # --publish tells nx release to also publish the packages to the configured registry (npm)
          npx nx release --verbose --git-remote=origin --publish
