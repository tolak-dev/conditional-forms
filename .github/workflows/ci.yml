name: Nx CI/CD Pipeline

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  # Job for running linting and testing on Pull Requests
  pr-checks:
    name: PR Checks (Lint & Test Affected)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Set a timeout for the job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for Nx affected commands to correctly determine changes
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps # Install dependencies, using legacy peer deps if necessary

      - name: Derive SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: npx nx affected -t lint --parallel=3 --skip-nx-cache

      - name: Test affected
        run: npx nx affected -t test --parallel=3 --skip-nx-cache

      - name: Typecheck affected
        run: npx nx affected -t typecheck --parallel=3 --skip-nx-cache

  # Job for releasing and publishing after merge to master
  release-and-publish:
    name: Release
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    needs: [pr-checks]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # IMPORTANT: Fetch all history for nx release to correctly determine versions and generate changelogs
          fetch-depth: 0
          # Provide a token with write access to push back version bumps and tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps # Install dependencies, using legacy peer deps if necessary

      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Nx Release
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            npx nx release version ${{ github.event.inputs.version }} --git-commit --git-tag --git-push
          else
            npx nx release version --git-commit --git-tag --git-push
          fi
        env:
          # NPM_TOKEN is required for publishing to npm
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # GITHUB_TOKEN is used by nx release to push tags and commits
          # It's automatically provided by GitHub Actions, but explicitly passing it can be safer.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npx nx release publish --yes --skip-nx-cache
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true # Optional: enables NPM provenance signing
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for publishing with nx release
