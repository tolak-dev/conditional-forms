name: CI & Release Pipeline

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version (patch, minor, major, or 1.2.3)'
        required: false

jobs:
  # ----------------------------
  # 1️⃣ CI Job - Always runs first
  # ----------------------------
  ci:
    name: Lint, Test, Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: npx nx affected -t lint --parallel=3

      # - name: Test affected
      #   run: npx nx affected -t test --parallel=3

      # - name: Typecheck affected
      #   run: npx nx affected -t typecheck --parallel=3

  # ----------------------------
  # 2️⃣ Release + Publish Job - Only if CI passes
  # ----------------------------
  release:
    name: Version & Publish to npm
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Version and generate changelogs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            npx nx release --version ${{ github.event.inputs.version }} --yes
          else
            npx nx release --yes
          fi

      - name: Push versioned changes and tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push && git push --follow-tags

      - name: Publish to npm
        run: npx nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
