name: Publish to npm

on:
  push:
    tags:
      - 'conditional-forms@*' # Trigger only when a version tag is pushed

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for provenance and NPM 2FA bypass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build package
        run: npx nx run conditional-forms:build

      - name: Publish to npm
        run: npx nx release publish --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true # Optional: enables NPM provenance signing
