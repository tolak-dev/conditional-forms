name: Publish

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to release (e.g. conditional-forms)'
        required: true
      version:
        description: 'Version bump (patch, minor, major, or 1.2.3)'
        required: false
        default: ''
  release:
    types: [published]
jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: npx nx run ${{ github.event.inputs.project }}:build --skip-nx-cache

      - name: Release and Publish
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name}}
          npx nx release version --specifier $VERSION 
          npx nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
