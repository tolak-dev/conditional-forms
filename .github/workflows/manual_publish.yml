name: Publish

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to release (e.g. conditional-forms)'
        required: true
      version:
        description: 'Version bump (patch, minor, major, or 1.2.3)'
        required: false
        default: ''
  release:
    types: [published]
jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build package
        run: npx nx run ${{ github.event.inputs.project }}:build --skip-nx-cache

      - name: Version and generate changelogs for affected projects
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            npx nx release version ${{ github.event.inputs.version }} --git-commit --git-tag --git-push
            echo "Version set to ${{ github.event.inputs.version }}"
          else
            npx nx release version --git-commit --git-tag --git-push
            echo "No version input provided, using default versioning"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npx nx release publish --yes
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
